# ÜCRETSİZ kalıcılık (önerilen):
# - SQLite yerine harici Postgres kullanın (Supabase/Neon Free).
# - Render Environment'a DATABASE_URL verin.
services:
  - type: web
    name: parti-kirtasiye-pdks
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      # DATABASE_URL: Render panelinden ekleyin (Supabase/Neon connection string)
      # - key: DATABASE_URL
      #   value: postgres://...
