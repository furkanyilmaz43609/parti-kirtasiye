<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesai</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f6f8;
            --card: #ffffff;
            --text: #2c3338;
            --muted: #6b7280;
            --accent: #3d7a63;
            --accent-hover: #2f6250;
            --border: #e5e7eb;
        }
        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        .shell { max-width: 420px; margin: 0 auto; padding: 1.25rem 1rem 2rem; }
        .card-pdks {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }
        .btn-accent { background-color: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-accent:hover:not(:disabled) { background-color: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
        .form-select, .form-control { border-color: var(--border); }
        .form-select:focus, .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 0.2rem rgba(61,122,99,.18); }
    </style>
</head>
<body>
<div class="shell">
    <div class="card-pdks p-4">
        <h1 class="h5 fw-semibold mb-1">Giriş / Çıkış</h1>
        <p class="small text-secondary mb-3">Mağazanın kablosuz internetine bağlı olduğunuzdan emin olun.</p>

        {% if latest_note %}
            <div class="alert alert-light border small mb-3 py-2">
                <strong class="text-dark">Not:</strong> {{ latest_note.content }}
            </div>
        {% endif %}

        <form id="p-form" class="row g-3">
            <div class="col-12">
                <label class="form-label small mb-1">Mağaza</label>
                <select class="form-select" id="branch_id" name="branch_id" required aria-label="Mağaza">
                    <option value="">Seçiniz</option>
                    {% for b in branches %}
                        <option value="{{ b.id }}">{{ b.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-12">
                <label class="form-label small mb-1">Ad Soyad</label>
                <select class="form-select" id="personnel_id" name="personnel_id" required aria-label="Personel">
                    <option value="">Önce mağaza seçin</option>
                    {% for p in personnel %}
                        <option value="{{ p.id }}" data-branch="{{ p.branch_id }}">{{ p.full_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <input type="hidden" name="action" id="action-field" value="">

            <div class="col-12">
                <div id="info" class="small text-muted">Mağaza ve isim seçilince sıradaki işlem belirlenecek.</div>
            </div>

            <div class="col-12 d-grid">
                <button type="submit" class="btn btn-accent btn-lg" id="submit-btn" disabled>Yükleniyor…</button>
            </div>
        </form>
        <div id="feedback" class="mt-3 small"></div>
    </div>
</div>

<script>
    const branch = document.getElementById("branch_id");
    const pers = document.getElementById("personnel_id");
    const actionF = document.getElementById("action-field");
    const info = document.getElementById("info");
    const btn = document.getElementById("submit-btn");
    const fb = document.getElementById("feedback");

    function filt() {
        const bid = branch.value;
        pers.options[0].textContent = bid ? "Personel seçin" : "Önce mağaza seçin";
        for (let i = 1; i < pers.options.length; i++) {
            const o = pers.options[i];
            o.hidden = Boolean(bid) && o.dataset.branch !== bid;
        }
        const cur = pers.selectedOptions[0];
        if (!cur || cur.hidden) pers.value = "";
        sync();
    }

    async function sync() {
        fb.textContent = "";
        actionF.value = "";
        const bid = branch.value, pid = pers.value;
        if (!bid || !pid) {
            info.innerHTML = "Mağazanın kayıtlı çıkış IP adresi ile aynı ağdasınız gerekiyor.";
            btn.disabled = true;
            btn.classList.remove("btn-warning", "text-dark");
            btn.classList.add("btn-accent");
            btn.textContent = "Önce seçin";
            return;
        }
        info.textContent = "Kontrol ediliyor…";
        btn.disabled = true;
        const r = await fetch(`/api/personnel-durum?personnel_id=${encodeURIComponent(pid)}&branch_id=${encodeURIComponent(bid)}`);
        const d = await r.json();
        if (!d.ok) {
            info.textContent = d.message || "Hata.";
            btn.textContent = "İşlem yok";
            return;
        }
        if (d.next_action === "blocked") {
            actionF.value = "";
            info.innerHTML = `<span class="text-danger">${d.message || "Bu ağdan işlem yapılamıyor."}</span><br>
                <span class="text-muted">Görünen adres: ${d.client_ip || "—"}</span>`;
            btn.disabled = true;
            btn.textContent = "Kapalı";
            btn.classList.remove("btn-accent", "btn-warning");
            btn.classList.add("btn-secondary");
            return;
        }
        actionF.value = d.next_action;
        info.innerHTML = `Bağlantı uygun görünüyor. <span class="text-muted">(${d.client_ip})</span>`;
        btn.disabled = false;
        btn.classList.remove("btn-secondary", "btn-accent");
        if (d.next_action === "out") {
            btn.classList.add("btn-warning", "text-dark");
            btn.textContent = "Çıkış Yap";
        } else {
            btn.classList.remove("btn-warning", "text-dark");
            btn.classList.add("btn-accent");
            btn.textContent = "Giriş Yap";
        }
    }

    branch.addEventListener("change", filt);
    pers.addEventListener("change", sync);

    document.getElementById("p-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!actionF.value) return;
        const fd = new FormData(e.target);
        const res = await fetch("/api/punch", { method: "POST", body: fd });
        const data = await res.json();
        fb.className = "mt-3 small " + (data.ok ? "text-success" : "text-danger");
        fb.textContent = data.message;
        if (data.ok) await sync();
    });

    filt();
</script>
</body>
</html>
