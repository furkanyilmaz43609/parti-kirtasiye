<!doctype html>
<html lang="tr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ branch.name }} - Dinamik Kod</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #111827 0%, #020617 100%);
        }
        .code-box {
            font-size: clamp(2rem, 10vw, 5rem);
            letter-spacing: 0.6rem;
            font-weight: 800;
            text-align: center;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 1rem;
            padding: 1rem 1.5rem;
        }
    </style>
</head>
<body>
<div class="container px-3">
    <div class="card p-4 mx-auto" style="max-width:700px">
        <h3 class="mb-1">{{ branch.name }} Şubesi</h3>
        <p class="text-secondary">Kod her 20 saniyede bir otomatik yenilenir.</p>
        <div id="code" class="code-box my-3">{{ code }}</div>
        <div class="d-flex justify-content-between small text-secondary">
            <span>Şube ID: {{ branch.id }}</span>
            <span id="server-time">--</span>
        </div>
    </div>
</div>

<script>
    async function refreshCode() {
        const res = await fetch(`/api/sube/{{ branch.id }}/kod`);
        const data = await res.json();
        if (data.ok) {
            document.getElementById('code').textContent = data.code;
            document.getElementById('server-time').textContent = `Sunucu: ${data.server_time}`;
        }
    }
    refreshCode();
    setInterval(refreshCode, 20000);
</script>
</body>
</html>
