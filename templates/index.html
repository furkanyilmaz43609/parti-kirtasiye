<!doctype html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici girişi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: #eef1f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
            color: #1f2937;
        }
        .box {
            width: min(400px, 92vw);
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.75rem;
            box-shadow: 0 2px 8px rgba(0,0,0,.06);
        }
    </style>
</head>
<body>
<div class="box">
    <h1 class="h5 fw-semibold mb-1">Yönetici</h1>
    <p class="small text-secondary mb-3">Panel erişimi</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'danger' else category if category in ['success','warning','info'] else 'secondary' }} py-2 small">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% if mode == "setup" %}
        <form method="post">
            <input type="hidden" name="action" value="setup_password">
            <input type="hidden" name="next" value="{{ next or '' }}">
            <div class="mb-2">
                <label class="form-label small">Yeni şifre</label>
                <input type="password" class="form-control form-control-sm" name="password" required>
            </div>
            <div class="mb-3">
                <label class="form-label small">Tekrar</label>
                <input type="password" class="form-control form-control-sm" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-dark w-100 btn-sm">Kaydet</button>
        </form>
    {% else %}
        <form method="post">
            <input type="hidden" name="action" value="login">
            <input type="hidden" name="next" value="{{ next or '' }}">
            <div class="mb-3">
                <label class="form-label small">Şifre</label>
                <input type="password" class="form-control form-control-sm" name="password" required autofocus>
            </div>
            <button type="submit" class="btn btn-dark w-100 btn-sm">Giriş</button>
        </form>
    {% endif %}

    <hr class="my-4 opacity-25">
    <a href="/personel" class="btn btn-outline-secondary btn-sm w-100">Personel ekranı →</a>
</div>
</body>
</html>
