<!doctype html>
<html lang="tr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönetici girişi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --panel: #151922;
            --line: #353b4d;
            --ink: #e6e8ec;
            --muted: #8b929e;
        }
        body {
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(ellipse 100% 70% at 50% -15%, #141a24 0%, var(--bg) 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            color: var(--ink);
            padding: clamp(1rem, 4vw, 2rem);
        }
        .box {
            width: min(420px, 100%);
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 1.75rem;
            box-shadow: 0 24px 48px rgba(0,0,0,.5);
        }
        .form-control {
            background: #12151c;
            border-color: var(--line);
            color: var(--ink);
        }
        .form-control:focus {
            background: #12151c;
            border-color: #4a9b7d;
            color: var(--ink);
            box-shadow: 0 0 0 .2rem rgba(74,155,125,.2);
        }
    </style>
</head>
<body>
<div class="box">
    <h1 class="h5 fw-semibold mb-1 text-light">Yönetici</h1>
    <p class="small mb-3" style="opacity:.75;color:#cfd5df">Panel erişimi</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'danger' else category if category in ['success','warning','info'] else 'secondary' }} py-2 small">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% if mode == "setup" %}
        <form method="post">
            <input type="hidden" name="action" value="setup_password">
            <input type="hidden" name="next" value="{{ next or '' }}">
            <div class="mb-2">
                <label class="form-label small">Yeni şifre</label>
                <input type="password" class="form-control form-control-sm" name="password" required>
            </div>
            <div class="mb-3">
                <label class="form-label small">Tekrar</label>
                <input type="password" class="form-control form-control-sm" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-success w-100 btn-sm">Kaydet</button>
        </form>
    {% else %}
        <form method="post">
            <input type="hidden" name="action" value="login">
            <input type="hidden" name="next" value="{{ next or '' }}">
            <div class="mb-3">
                <label class="form-label small">Şifre</label>
                <input type="password" class="form-control form-control-sm" name="password" required autofocus>
            </div>
            <button type="submit" class="btn btn-light w-100 btn-sm">Giriş</button>
        </form>
    {% endif %}

    <hr class="my-4 border-secondary opacity-50">
    <a href="/personel" class="btn btn-outline-secondary btn-sm w-100">Personel ekranı →</a>
</div>
</body>
</html>
