<!doctype html>
<html lang="tr" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDKS Mobil İşlem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #030712;
            color: #e5e7eb;
        }
        .shell {
            max-width: 620px;
            margin: 1rem auto 3rem;
        }
    </style>
</head>
<body>
<div class="container shell">
    <div class="card mt-3">
        <div class="card-body">
            <h4>Personel Devam İşlemi</h4>
            <p class="text-secondary mb-3">Dinamik kod ile güvenli giriş/çıkış yapın.</p>

            {% if latest_note %}
                <div class="alert alert-info">
                    <strong>Yönetici Notu:</strong> {{ latest_note.content }}
                </div>
            {% endif %}

            <form id="punch-form" class="row g-3">
                <div class="col-12">
                    <label class="form-label">Şube</label>
                    <select class="form-select" name="branch_id" required>
                        <option value="">Seçiniz</option>
                        {% for b in branches %}
                            <option value="{{ b.id }}">{{ b.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Personel</label>
                    <select class="form-select" name="personnel_id" required>
                        <option value="">Seçiniz</option>
                        {% for p in personnel %}
                            <option value="{{ p.id }}">{{ p.full_name }} - {{ p.branch_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Dinamik Kod (6 hane)</label>
                    <input type="text" class="form-control" name="code" minlength="6" maxlength="6" required>
                </div>
                <div class="col-12">
                    <label class="form-label">İşlem Tipi</label>
                    <select class="form-select" name="action" required>
                        <option value="in">Giriş Yap</option>
                        <option value="out">Çıkış Yap</option>
                    </select>
                </div>
                <div class="col-12 d-grid">
                    <button type="submit" class="btn btn-primary">İşlemi Kaydet</button>
                </div>
            </form>
            <div id="result" class="mt-3"></div>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById("punch-form");
    const result = document.getElementById("result");
    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        const res = await fetch("/api/punch", {method: "POST", body: formData});
        const data = await res.json();
        result.className = `alert mt-3 ${data.ok ? "alert-success" : "alert-danger"}`;
        result.textContent = data.message;
    });
</script>
</body>
</html>
